<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>KORAGOAL</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">

    <div class="logo-text">
      KORAGOAL
    </div>

    <div class="live-btn">
      مباشر الآن
    </div>

  </div>

  <div class="content">

    <div class="main-col">

      <div class="league-menu">

  <button class="league-btn active" data-league="English Premier League">
    Premier League
  </button>

  <button class="league-btn" data-league="Spanish La Liga">
    La Liga
  </button>

  <button class="league-btn" data-league="Italian Serie A">
    Serie A
  </button>

  <button class="league-btn" data-league="German Bundesliga">
    Bundesliga
  </button>

  <button class="league-btn" data-league="French Ligue 1">
    Ligue 1
  </button>

</div>
      
      <div class="filters">
        <div class="filter-btn active">الكل</div>
        <div class="filter-btn">مباشر</div>
        <div class="filter-btn">اليوم</div>
        <div class="filter-btn">غداً</div>
      </div>

      <div class="section-title">
        مباريات اليوم
      </div>

      <div id="matches-container"></div>

    </div>

    <div class="sidebar">

      <div class="hero-card">

        <div class="hero-top">

          <div>
            المباراة الأبرز
          </div>

          <div class="live-badge">
            LIVE
          </div>

        </div>

        <div class="hero-teams">

          <div class="hero-team">
            <img class="hero-logo" src="https://media.api-sports.io/football/teams/40.png">
            <div class="hero-name">Liverpool</div>
          </div>

          <div class="hero-score">
            2 - 1
          </div>

          <div class="hero-team">
            <img class="hero-logo" src="https://media.api-sports.io/football/teams/50.png">
            <div class="hero-name">Man City</div>
          </div>

        </div>

        <button class="watch-btn">
          مشاهدة المباراة
        </button>

      </div>

      <div class="sidebar-card">

        <div class="sidebar-title">
          ترتيب الدوري الإنجليزي
        </div>

        <div class="table-header">
          <div>#</div>
          <div></div>
          <div>الفريق</div>
          <div>ن</div>
        </div>

        <div class="standing-row">
          <div>1</div>
          <img class="standing-logo" src="https://media.api-sports.io/football/teams/40.png">
          <div class="standing-name">Liverpool</div>
          <div class="standing-points">82</div>
        </div>

        <div class="standing-row">
          <div>2</div>
          <img class="standing-logo" src="https://media.api-sports.io/football/teams/50.png">
          <div class="standing-name">Man City</div>
          <div class="standing-points">78</div>
        </div>

        <div class="standing-row">
          <div>3</div>
          <img class="standing-logo" src="https://media.api-sports.io/football/teams/42.png">
          <div class="standing-name">Arsenal</div>
          <div class="standing-points">75</div>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
