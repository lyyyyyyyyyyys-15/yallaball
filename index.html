<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORAGOAL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <div class="logo-text">KORAGOAL</div>
    <div class="topbar-left">
      <div class="live-btn">مباشر الآن</div>
      <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</div>
    </div>
  </div>

  <div class="content">

    <div class="main-col">

      <div class="league-menu">
        <button class="league-btn active" data-league="all">الكل</button>
        <button class="league-btn" data-league="English Premier League">Premier League</button>
        <button class="league-btn" data-league="Spanish La Liga">La Liga</button>
        <button class="league-btn" data-league="German Bundesliga">Bundesliga</button>
        <button class="league-btn" data-league="Italian Serie A">Serie A</button>
        <button class="league-btn" data-league="French Ligue 1">Ligue 1</button>
      </div>

      <div class="matches-scroll" id="matches-container"></div>

    </div>

    <div class="sidebar">

      <div class="stream-card">
        <div class="stream-card-top">
          <div class="live-badge">LIVE</div>
        </div>
        <iframe class="stream-card-iframe" src="https://cdn25.yshoot.click/chtv/ch1.php" frameborder="0" allowfullscreen></iframe>
        <div class="stream-card-label">البث المباشر - يلا شوت</div>
      </div>

      <div class="sidebar-card" id="sidebar-standings">
        <div class="sidebar-title">ترتيب الدوري</div>
        <div id="sidebar-standings-content">
          <div class="no-matches" style="padding:15px;font-size:14px;">اختر دورياً</div>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
