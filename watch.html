<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORAGOAL - مشاهدة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-btn">← الرجوع</a>
    <div class="logo-text">KORAGOAL</div>
    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</div>
  </div>

  <div class="watch-page">

    <div class="watch-vs">
      <div class="watch-vs-team">
        <img class="watch-vs-logo" id="w-home-badge" src="">
        <div class="watch-vs-name" id="w-home-name">--</div>
      </div>
      <div class="watch-vs-score" id="w-score">VS</div>
      <div class="watch-vs-team">
        <img class="watch-vs-logo" id="w-away-badge" src="">
        <div class="watch-vs-name" id="w-away-name">--</div>
      </div>
    </div>

    <div class="watch-info" id="w-info"></div>

    <div class="watch-player" id="w-player">
      <iframe id="w-iframe" src="https://cdn25.yshoot.click/chtv/ch1.php" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="watch-url">
      <input type="text" id="w-input" placeholder="رابط البث..." />
      <button id="w-btn">تحديث</button>
    </div>

  </div>

  <script src="watch.js"></script>
</body>
</html>
