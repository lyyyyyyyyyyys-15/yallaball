<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KORAGOAL - مشاهدة المباراة</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-btn">← الرجوع</a>
    <div class="logo-text">KORAGOAL</div>
    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙</div>
  </div>

  <div class="watch-page">

    <div class="watch-match-header" id="watch-header">
      <div class="watch-team">
        <img class="watch-logo" id="watch-home-badge" src="https://placeholder.com">
        <div class="watch-team-name" id="watch-home-name">جاري جلب المباراة...</div>
      </div>
      <div class="watch-score" id="watch-score">- :-</div>
      <div class="watch-team">
        <img class="watch-logo" id="watch-away-badge" src="https://placeholder.com">
        <div class="watch-team-name" id="watch-away-name">بث مباشر</div>
      </div>
    </div>

    <div class="match-info" id="match-info">
      <div class="info-grid">
        <div class="info-card">
          <div class="info-icon">🏆</div>
          <div class="info-label">الدوري</div>
          <div class="info-value" id="info-league">مباشر اليوم</div>
        </div>
        <div class="info-card">
          <div class="info-icon">📅</div>
          <div class="info-label">التاريخ</div>
          <div class="info-value" id="info-date">اليوم</div>
        </div>
        <div class="info-card">
          <div class="info-icon">⏰</div>
          <div class="info-label">الوقت</div>
          <div class="info-value" id="info-time">الآن</div>
        </div>
        <div class="info-card">
          <div class="info-icon">📺</div>
          <div class="info-label">القنوات الناقلة</div>
          <div class="info-value" id="info-channels">ياسين لايف أوتو</div>
        </div>
      </div>
    </div>

    <!-- حاوية مشغل الفيديو التي سيتحكم بها كود الجافا سكريبت ويغير الرابط داخلها ديناميكياً -->
    <div class="watch-player-wrapper" id="watch-player-wrapper">
      <iframe id="stream-player" src="about:blank" frameborder="0" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>

    <div class="watch-controls" id="watch-controls">
      <div class="watch-label">رابط البث المباشر النشط حالياً</div>
      <div class="stream-input-row">
        <input type="text" id="stream-url-input" readonly placeholder="جاري قراءة الرابط الأوتوماتيكي..." />
        <button id="load-stream-btn" style="display:none">تحديث</button>
      </div>
      <div class="stream-hint">يتم تحديث هذا الرابط من السيرفر المصدر تلقائياً بدون تدخل منك</div>
    </div>

    <div class="watch-highlights" id="watch-highlights" style="display:none">
      <div class="watch-label">ملخص المباراة</div>
      <div class="highlights-player">
        <iframe id="highlights-frame" src="" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>

  </div>

  <script src="watch.js"></script>
</body>
</html>
